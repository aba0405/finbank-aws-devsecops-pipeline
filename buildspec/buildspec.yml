version: 0.2

# FinBank CodeBuild buildspec
#
# Builds the container image and pushes TWO tags to ECR:
#   - <short-sha> : per-commit traceability (which exact commit is this image)
#   - latest      : moving pointer the ImageScan action + ECS deploy target
# Repo is MUTABLE so :latest can be re-pushed each build.
#
# Security scanning is NOT here -- it runs as native InspectorScan pipeline
# actions. This buildspec only builds and publishes.
#
# Required environment variables (set on the CodeBuild project by Terraform):
#   AWS_ACCOUNT_ID, AWS_REGION, ECR_REPO_URL, CONTAINER_NAME

phases:
  pre_build:
    commands:
      - echo "Logging in to Amazon ECR..."
      - aws ecr get-login-password --region "$AWS_REGION" | docker login --username AWS --password-stdin "$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com"
      - IMAGE_TAG="${CODEBUILD_RESOLVED_SOURCE_VERSION:-latest}"
      - IMAGE_TAG="${IMAGE_TAG:0:12}"   # short SHA
      - echo "Image tags will be $IMAGE_TAG and latest"

  build:
    commands:
      - echo "Building image..."
      - docker build -t "$ECR_REPO_URL:$IMAGE_TAG" ./app
      - docker tag "$ECR_REPO_URL:$IMAGE_TAG" "$ECR_REPO_URL:latest"

  post_build:
    commands:
      - echo "Pushing images to ECR..."
      - docker push "$ECR_REPO_URL:$IMAGE_TAG"
      - docker push "$ECR_REPO_URL:latest"
      # ECS deploy reads imagedefinitions.json. Point it at the SHA tag so the
      # running task records the exact commit deployed (better than :latest).
      - printf '[{"name":"%s","imageUri":"%s"}]' "$CONTAINER_NAME" "$ECR_REPO_URL:$IMAGE_TAG" > imagedefinitions.json
      - echo "Wrote imagedefinitions.json:"
      - cat imagedefinitions.json

artifacts:
  files:
    - imagedefinitions.json
